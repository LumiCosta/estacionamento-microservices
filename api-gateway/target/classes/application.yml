spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: vagas-service
          uri: lb://vagas-service
          predicates: [Path=/api/vagas/**]
        - id: reservas-service
          uri: lb://reservas-service
          predicates: [Path=/api/reservas/**]
          filters: []
        - id: pagamentos-service
          uri: lb://pagamentos-service
          predicates: [Path=/api/pagamentos/**]
          filters: []
        - id: ocupacao-service
          uri: lb://ocupacao-service
          predicates: [Path=/api/ocupacao/**]
server: { port: 8080 }
eureka.client.service-url.defaultZone: http://localhost:8761/eureka
management.endpoints.web.exposure.include: health,info,gateway,circuitbreakers
