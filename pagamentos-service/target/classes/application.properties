spring.application.name=pagamentos-service
server.port=8300
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.datasource.url=jdbc:h2:mem:pagamentosdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
management.endpoints.web.exposure.include=health,info,metrics
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
resilience4j.retry.instances.gatewayPagamento.max-attempts=3
resilience4j.retry.instances.gatewayPagamento.wait-duration=1s
